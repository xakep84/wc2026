permissions: contents: write

name: Обновить ЧМ 2026

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Зависимости
        run: pip install requests
      - name: Получить данные
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/fetch_wc.py
      - name: Коммит
        run: |
          git config user.name "WC2026 Bot"
          git config user.email "bot@wc2026.local"
          git add data.json
          git diff --staged --quiet || git commit -m "Обновление $(date -u +%Y-%m-%d_%H:%M)"
          git push
