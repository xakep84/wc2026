permissions:
  contents: write
  pages: write
  id-token: write

name: Обновить ЧМ 2026

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Зависимости
        run: pip install requests
      - name: Получить данные
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/fetch_wc.py
      - name: Коммит
        run: |
          git config user.name "WC2026 Bot"
          git config user.email "bot@wc2026.local"
          git add data.json
          git diff --staged --quiet || git commit -m "Обновление $(date -u +%Y-%m-%d_%H:%M)" && git push
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
